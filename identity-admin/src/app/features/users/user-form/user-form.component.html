<div class="animate-fade-in max-w-2xl">
  <h1 class="text-2xl font-bold text-slate-800 dark:text-slate-100 mb-6">{{ (isEdit ? 'users.editUser' : 'users.createUser') | translate }}</h1>
  @if (error) {
    <div class="mb-4 p-3 rounded-lg bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-400 text-sm">{{ error }}</div>
  }
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">{{ 'users.userName' | translate }}</label>
      <input type="text" formControlName="userName" class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">{{ 'users.email' | translate }}</label>
      <input type="email" formControlName="email" class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-indigo-500" [readonly]="isEdit" />
    </div>
    @if (!isEdit) {
      <div>
        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">{{ 'auth.password' | translate }}</label>
        <input type="password" formControlName="password" class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-indigo-500" />
      </div>
    }
    <div class="flex items-center gap-2">
      <input type="checkbox" formControlName="isActive" id="isActive" class="rounded border-slate-300 text-indigo-600 focus:ring-indigo-500" />
      <label for="isActive" class="text-sm text-slate-700 dark:text-slate-300">{{ 'common.active' | translate }}</label>
    </div>
    @if (!loadingRoles) {
      <div>
        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">{{ 'users.roles' | translate }}</label>
        <div class="flex flex-wrap gap-2">
          @for (r of roles; track r.id) {
            <label class="inline-flex items-center gap-2 px-3 py-1.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-700 transition">
              <input type="checkbox" [value]="r.id" [checked]="form.get('roleIds')?.value?.includes(r.id)" (change)="toggleRole(r.id)" class="rounded border-slate-300 text-indigo-600 focus:ring-indigo-500" />
              <span class="text-slate-800 dark:text-slate-100 text-sm">{{ r.name }}</span>
            </label>
          }
        </div>
      </div>
    }
    <div class="flex gap-2 pt-4">
      <button type="submit" [disabled]="loading" class="px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white font-medium transition">
        @if (loading) { <span class="inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span> } @else { {{ 'common.save' | translate }} }
      </button>
      <a routerLink="/users" class="px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition">{{ 'common.cancel' | translate }}</a>
    </div>
  </form>
</div>
