<div class="animate-fade-in max-w-2xl">
  <h1 class="text-2xl font-bold text-slate-800 dark:text-slate-100 mb-6">{{ (isEdit ? 'permissions.editPermission' : 'permissions.createPermission') | translate }}</h1>
  @if (error) {
    <div class="mb-4 p-3 rounded-lg bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-400 text-sm">{{ error }}</div>
  }
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">{{ 'common.name' | translate }}</label>
      <input type="text" formControlName="name" class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">{{ 'common.code' | translate }}</label>
      <input type="text" formControlName="code" class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-indigo-500 font-mono" />
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">{{ 'common.description' | translate }}</label>
      <textarea formControlName="description" rows="2" class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-indigo-500"></textarea>
    </div>
    <div class="flex gap-2 pt-4">
      <button type="submit" [disabled]="loading" class="px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white font-medium transition">
        @if (loading) { <span class="inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span> } @else { {{ 'common.save' | translate }} }
      </button>
      <a routerLink="/permissions" class="px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition">{{ 'common.cancel' | translate }}</a>
    </div>
  </form>
</div>
