<div class="animate-fade-in max-w-2xl">
  <h1 class="text-2xl font-bold text-slate-800 dark:text-slate-100 mb-6">
    {{ isEdit() ? ('common.edit' | translate) : ('common.add' | translate) }} {{ 'app.riskAssignment' | translate }}
  </h1>
  @if (loading()) {
    <p class="text-slate-600 dark:text-slate-400">{{ 'common.loading' | translate }}</p>
  } @else {
    @if (error()) {
      <div class="mb-4 p-3 rounded-lg bg-red-100 dark:bg-red-900/30 text-red-800 dark:text-red-200">{{ error() }}</div>
    }
    <form (ngSubmit)="submit()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Customer Id *</label>
        <input type="text" [ngModel]="customerId()" name="customerId" (ngModelChange)="customerId.set($event)"
          class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100" [readonly]="isEdit()" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Country Risk</label>
        <input type="number" [ngModel]="countryRisk()" name="countryRisk" (ngModelChange)="countryRisk.set(+$event || 0)"
          class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Customer Type Risk</label>
        <input type="number" [ngModel]="customerTypeRisk()" name="customerTypeRisk" (ngModelChange)="customerTypeRisk.set(+$event || 0)"
          class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">PEP Risk</label>
        <input type="number" [ngModel]="pepRisk()" name="pepRisk" (ngModelChange)="pepRisk.set(+$event || 0)"
          class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Transaction Risk</label>
        <input type="number" [ngModel]="transactionRisk()" name="transactionRisk" (ngModelChange)="transactionRisk.set(+$event || 0)"
          class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Industry Risk</label>
        <input type="number" [ngModel]="industryRisk()" name="industryRisk" (ngModelChange)="industryRisk.set(+$event || 0)"
          class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Total Score</label>
        <input type="number" [ngModel]="totalScore()" name="totalScore" (ngModelChange)="totalScore.set(+$event || 0)"
          class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Risk Level</label>
        <input type="text" [ngModel]="riskLevel()" name="riskLevel" (ngModelChange)="riskLevel.set($event)"
          placeholder="e.g. Low, Medium, High" class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100" />
      </div>
      @if (isEdit()) {
        <div class="flex items-center gap-2">
          <input type="checkbox" [ngModel]="isActive()" name="isActive" (ngModelChange)="isActive.set($event)" />
          <label class="text-sm font-medium text-slate-700 dark:text-slate-300">{{ 'common.isActive' | translate }}</label>
        </div>
      }
      <div class="flex gap-2 pt-4">
        <button type="submit" [disabled]="saving()" class="px-4 py-2 rounded-lg bg-slate-700 dark:bg-slate-600 text-white hover:bg-slate-600 dark:hover:bg-slate-500 disabled:opacity-50">
          {{ saving() ? ('common.saving' | translate) : ('common.save' | translate) }}
        </button>
        <button type="button" (click)="cancel()" class="px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800">
          {{ 'common.cancel' | translate }}
        </button>
      </div>
    </form>
  }
</div>
